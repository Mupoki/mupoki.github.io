<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#00000000">
  <link rel="manifest" href="manifest.json">
  <title>Photopea-Style Top Bar Test</title>
  <style>
    :root {
      --accent: #00b4ff;
      --bg: #0f1720;
      --nav-bg: rgba(17, 23, 32, 0.8);
      --nav-border: rgba(255, 255, 255, 0.07);
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: linear-gradient(135deg, #111820, #0f1720);
      color: white;
      font-family: "Segoe UI", Arial, sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* Photopea-style top bar */
    .photopea-bar {
      backdrop-filter: blur(10px);
      background: var(--nav-bg);
      border-bottom: 1px solid var(--nav-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 14px;
      height: 32px;
      font-size: 13px;
      margin-top: env(titlebar-area-height, 0px);
    }

    .photopea-bar a {
      color: #ddd;
      text-decoration: none;
      margin: 0 8px;
      opacity: 0.85;
      transition: color 0.2s, opacity 0.2s;
    }

    .photopea-bar a:hover {
      opacity: 1;
      color: var(--accent);
    }

    .menu, .right-menu {
      display: flex;
      align-items: center;
    }

    .right-menu a {
      font-weight: 500;
    }

    main {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.8;
      font-size: 1rem;
    }

    .install-hint {
      position: fixed;
      bottom: 20px;
      background: rgba(255,255,255,0.1);
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <nav class="photopea-bar">
    <div class="menu">
      <a href="#">File</a>
      <a href="#">Edit</a>
      <a href="#">Image</a>
      <a href="#">Layer</a>
      <a href="#">Select</a>
      <a href="#">Filter</a>
      <a href="#">View</a>
      <a href="#">Window</a>
      <a href="#">More</a>
    </div>
    <div class="right-menu">
      <a href="#">Account</a>
      <a href="#">🔍</a>
    </div>
  </nav>

  <main>
    <h1>🪟 Transparent Top Bar + Photopea-Style Menu</h1>
    <p>This demo shows a Chrome OS transparent top bar with a Photopea-like navigation.</p>
  </main>

  <div class="install-hint">
    Tip: Click ⋮ → “Install app” to test Chrome OS top bar transparency.
  </div>
</body>
</html>
